aid: nacelle-com
name: Nacelle
description: >-
  Nacelle is a headless commerce and AI personalization platform founded in
  2019 that provides a composable data orchestration layer for premium
  ecommerce brands. The platform sits between commerce systems of record
  (Shopify, BigCommerce, Salesforce Commerce Cloud) and CMS/content systems
  (Contentful, Sanity), ingesting product, content, pricing, inventory, order,
  and customer data, then exposing a normalized Storefront GraphQL API and
  Storefront SDK to power custom frontends, personalized merchandising, and
  AI-driven product discovery. Nacelle's Ingest REST API and prebuilt
  connectors (Shopify, Contentful, Sanity) move data into the platform, the
  Storefront GraphQL API and JavaScript SDK syndicate it to storefronts, and
  the Admin API manages spaces and configuration. The company's product line
  includes the AI Personalization Suite featuring "Paige" (an AI shopping
  assistant), behavioral targeting, recommendations, cross-sell/upsell, and
  composable data orchestration. Pricing is plan-based — Standard at $399/mo
  and Enterprise custom — with the Headless Commerce platform sold as an
  enterprise tier. Customers include Boll & Branch, FTD, ProFlowers, Ancient
  Nutrition, Rhone, Barefoot Dreams, Peach & Lily, and Healthy Baby.
