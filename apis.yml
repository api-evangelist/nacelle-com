apis:
- aid: nacelle-com:nacelle-storefront-graphql-api
  name: Nacelle Storefront GraphQL API
  description: >-
    The Storefront GraphQL API is Nacelle's primary query interface for
    syndicating normalized commerce data — products, variants, content,
    pricing, price rules, media, metafields, SEO, and product options — to
    custom storefronts and frontends. It supports typed fields, input
    filters, and preview data for unpublished content. Authenticated via
    Storefront API tokens; consumed directly over HTTPS or via the
    JavaScript Storefront SDK (v1.x and v2.x) with GraphQL Codegen support.
  tags:
  - Commerce
  - GraphQL
  - Storefront
  - Headless Commerce
  humanURL: https://docs.nacelle.com/docs/storefront-graphql-api-stable
  properties:
  - url: https://docs.nacelle.com/docs/storefront-graphql-api-stable
    type: Documentation
  - url: https://docs.nacelle.com/docs/graphql-explorer
    type: Sandbox
    name: GraphQL Explorer
  - url: https://docs.nacelle.com/docs/javascript-storefront-sdk
    type: SDKs
    name: JavaScript Storefront SDK
  - url: https://docs.nacelle.com/docs/storefront-sdk-major-version-2
    type: SDKs
    name: Storefront SDK 2.x
  - url: https://docs.nacelle.com/docs/auth-storefront
    type: Authentication
  - url: graphql/nacelle-com-graphql.md
    type: GraphQL
- aid: nacelle-com:nacelle-ingest-rest-api
  name: Nacelle Ingest REST API
  description: >-
    The Ingest REST API moves commerce data into Nacelle from any source —
    products, content, pricing, inventory, orders, and customer data — and
    backs Nacelle's prebuilt Shopify, Contentful, and Sanity connectors as
    well as custom connectors for proprietary systems. Data ingested via
    this API is normalized into Nacelle's commerce data model and made
    available through the Storefront GraphQL API.
  tags:
  - Commerce
  - Ingest
  - REST
  - Data Orchestration
  humanURL: https://docs.nacelle.com/docs/ingest-rest-api
  properties:
  - url: https://docs.nacelle.com/docs/ingest-rest-api
    type: Documentation
  - url: https://docs.nacelle.com/docs/auth-oauth
    type: Authentication
  - url: https://docs.nacelle.com/docs/auth-credentials
    type: Authentication
- aid: nacelle-com:nacelle-admin-api
  name: Nacelle Admin API
  description: >-
    The Admin API exposes administrative operations for managing Nacelle
    spaces, configuration, connectors, and platform-level resources outside
    of the storefront query and ingest paths. Used by the Nacelle Dashboard
    and platform tooling.
  tags:
  - Administrative
  - Commerce
  humanURL: https://docs.nacelle.com/docs/admin-api
  properties:
  - url: https://docs.nacelle.com/docs/admin-api
    type: Documentation
  - url: https://docs.nacelle.com/docs/auth-oauth
    type: Authentication
